
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - Sunnyside Holidays</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            background:#f4fbfc;
            color:#002b45;
        }

        header{
            width:90%;
            max-width:1400px;
            margin:45px auto 35px;
            background:white;
            padding:40px 55px;
            border-radius:18px;
            box-shadow:0 8px 25px rgba(0,0,0,0.08);
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo-img{
            width:145px;
        }

        nav{
            display:flex;
            gap:14px;
            flex-wrap:wrap;
        }

        nav a{
            background:#008c95;
            color:white;
            text-decoration:none;
            padding:15px 25px;
            border-radius:8px;
            font-weight:700;
            font-size:16px;
        }

        nav a:hover{
            background:#00b4c5;
        }

        main{
            width:70%;
            max-width:1150px;
            margin:30px auto;
        }

        .title{
            margin-bottom:22px;
        }

        .title h1{
            color:#073b66;
            font-size:28px;
            margin-bottom:18px;
            font-weight:700;
        }

        .title p{
            font-size:17px;
            color:#002b45;
        }

        .box{
            background:white;
            padding:28px;
            border-radius:16px;
            margin-bottom:28px;
            box-shadow:0 8px 25px rgba(0,0,0,0.08);
        }

        .box h2{
            background:#008c95;
            color:white;
            padding:5px 8px;
            margin-bottom:18px;
            font-size:16px;
            font-weight:500;
        }

        .row{
            display:flex;
            gap:20px;
            margin-bottom:18px;
            flex-wrap:wrap;
        }

        .field{
            flex:1;
            min-width:250px;
        }

        .field label{
            display:block;
            margin-bottom:12px;
            font-weight:700;
            font-size:17px;
            color:#002b45;
        }

        .field input{
            width:100%;
            padding:15px;
            border:1px solid #d0d0d0;
            border-radius:8px;
            font-size:16px;
            color:#333;
        }

        button{
            background:#008c95;
            color:white;
            border:none;
            padding:14px 30px;
            border-radius:8px;
            cursor:pointer;
            font-weight:700;
            font-size:15px;
            margin-right:10px;
            margin-top:5px;
        }

        button:hover{
            background:#00b4c5;
        }

        .delete-btn{
            background:#d63031;
        }

        .delete-btn:hover{
            background:#b71c1c;
        }

        #searchInput{
            width:100%;
            padding:14px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            border-radius:10px;
            overflow:hidden;
        }

        table th{
            background:#008c95;
            color:white;
            padding:14px;
            text-align:left;
            font-size:15px;
        }

        table td{
            padding:13px;
            border-bottom:1px solid #eee;
            font-size:14px;
        }

        table tr:hover{
            background:#f4fbfc;
        }

        footer{
            background:#063f4a;
            color:white;
            text-align:center;
            padding:25px;
            margin-top:40px;
        }
    </style>
</head>

<body>

<header>
    <img src="images/logo.png" class="logo-img" alt="Sunnyside Holidays Logo">

    <nav>
        <a href="index.html">Home</a>
        <a href="packages.html">Packages</a>
        <a href="bookings.html">Bookings</a>
        <a href="customers.html">Customers</a>
        <a href="payments.html">Payments</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<main>

    <div class="title">
        <h1>Customer Management</h1>
        <p>Add, edit, search and delete customers.</p>
    </div>

    <div class="box">
        <h2>Add / Edit Customer</h2>

        <input type="hidden" id="editId">

        <div class="row">
            <div class="field">
                <label>First Name</label>
                <input type="text" id="firstName">
            </div>

            <div class="field">
                <label>Last Name</label>
                <input type="text" id="lastName">
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>Email</label>
                <input type="email" id="email">
            </div>

            <div class="field">
                <label>Phone</label>
                <input type="text" id="phone">
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>Date of Birth</label>
                <input type="date" id="dob">
            </div>

            <div class="field">
                <label>Address</label>
                <input type="text" id="address">
            </div>
        </div>

        <button onclick="saveCustomer()">Save Customer</button>
        <button onclick="clearForm()">Clear</button>
    </div>

    <div class="box">
        <h2>All Customers</h2>

        <input type="text"
               id="searchInput"
               placeholder="Search customers..."
               onkeyup="displayCustomers()">

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>DOB</th>
                    <th>Address</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="customerTable"></tbody>
        </table>
    </div>

</main>

<footer>
    © 2026 Sunnyside Holidays Ltd
</footer>

<script>
    let customers = JSON.parse(localStorage.getItem("customers")) || [];
    let nextId = Number(localStorage.getItem("nextCustomerId")) || 1;

    function saveCustomer(){
        let editId = document.getElementById("editId").value;

        let customer = {
            id: editId ? Number(editId) : nextId++,
            firstName: document.getElementById("firstName").value,
            lastName: document.getElementById("lastName").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            dob: document.getElementById("dob").value,
            address: document.getElementById("address").value
        };

        if(customer.firstName === "" || customer.lastName === "" || customer.email === ""){
            alert("Please fill required fields");
            return;
        }

        if(editId === ""){
            customers.push(customer);
            alert("Customer added successfully");
        } else {
            customers = customers.map(function(c){
                if(c.id === Number(editId)){
                    return customer;
                }
                return c;
            });

            alert("Customer updated successfully");
        }

        localStorage.setItem("customers", JSON.stringify(customers));
        localStorage.setItem("nextCustomerId", nextId);

        clearForm();
        displayCustomers();
    }

    function displayCustomers(){
        let table = document.getElementById("customerTable");
        let search = document.getElementById("searchInput").value.toLowerCase();

        table.innerHTML = "";

        let filtered = customers.filter(function(c){
            return (
                c.firstName.toLowerCase().includes(search) ||
                c.lastName.toLowerCase().includes(search) ||
                c.email.toLowerCase().includes(search)
            );
        });

        if(filtered.length === 0){
            table.innerHTML = `
                <tr>
                    <td colspan="8" style="text-align:center;">
                        No customers found
                    </td>
                </tr>
            `;
            return;
        }

        filtered.forEach(function(c){
            table.innerHTML += `
                <tr>
                    <td>${c.id}</td>
                    <td>${c.firstName}</td>
                    <td>${c.lastName}</td>
                    <td>${c.email}</td>
                    <td>${c.phone}</td>
                    <td>${c.dob}</td>
                    <td>${c.address}</td>
                    <td>
                        <button onclick="editCustomer(${c.id})">Edit</button>
                        <button class="delete-btn" onclick="deleteCustomer(${c.id})">Delete</button>
                    </td>
                </tr>
            `;
        });
    }

    function editCustomer(id){
        let customer = customers.find(function(c){
            return c.id === id;
        });

        document.getElementById("editId").value = customer.id;
        document.getElementById("firstName").value = customer.firstName;
        document.getElementById("lastName").value = customer.lastName;
        document.getElementById("email").value = customer.email;
        document.getElementById("phone").value = customer.phone;
        document.getElementById("dob").value = customer.dob;
        document.getElementById("address").value = customer.address;

        window.scrollTo(0,0);
    }

    function deleteCustomer(id){
        if(!confirm("Delete this customer?")) return;

        customers = customers.filter(function(c){
            return c.id !== id;
        });

        localStorage.setItem("customers", JSON.stringify(customers));
        displayCustomers();

        alert("Customer deleted");
    }

    function clearForm(){
        document.getElementById("editId").value = "";
        document.getElementById("firstName").value = "";
        document.getElementById("lastName").value = "";
        document.getElementById("email").value = "";
        document.getElementById("phone").value = "";
        document.getElementById("dob").value = "";
        document.getElementById("address").value = "";
    }

    displayCustomers();
</script>

</body>
</html>
